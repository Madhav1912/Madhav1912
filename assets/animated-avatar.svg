<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stop-color="#0b0f19" stop-opacity="0.9"/>
            <stop offset="95%" stop-color="#ba00ff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#00ffe0" stop-opacity="0"/>
        </radialGradient>
        <filter id="neon">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff8f"/>
            <stop offset="100%" stop-color="#00ffe0"/>
        </linearGradient>
    </defs>
    
    <style>
        .float { animation: float 4s ease-in-out infinite; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; stroke-width: 2; }
            50% { opacity: 1; stroke-width: 4; }
        }
    </style>

    <g class="float">
        <!-- Outer rotating grid/HUD rings -->
        <circle cx="125" cy="125" r="100" fill="none" stroke="#1f2937" stroke-width="2" stroke-dasharray="10 5" />
        
        <circle cx="125" cy="125" r="85" fill="none" stroke="#ba00ff" stroke-width="2" stroke-dasharray="30 20 10 20" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate" from="0 125 125" to="360 125 125" dur="15s" repeatCount="indefinite" />
        </circle>

        <!-- Inner rotating target ring -->
        <circle cx="125" cy="125" r="70" fill="none" stroke="#00ff8f" stroke-width="3" stroke-dasharray="60 40" filter="url(#neon)">
            <animateTransform attributeName="transform" type="rotate" from="360 125 125" to="0 125 125" dur="8s" repeatCount="indefinite" />
        </circle>
        
        <!-- Core background -->
        <circle cx="125" cy="125" r="65" fill="url(#glow)" />
        
        <!-- Hexagon shield -->
        <polygon points="125,70 173,98 173,152 125,180 77,152 77,98" fill="none" stroke="#00ffe0" stroke-width="3" filter="url(#neon)" class="pulse"/>
        
        <!-- Secondary tiny rotating hexagon -->
        <polygon points="125,75 168,100 168,150 125,175 82,150 82,100" fill="none" stroke="#00ff8f" stroke-width="1">
            <animateTransform attributeName="transform" type="rotate" from="0 125 125" to="360 125 125" dur="20s" repeatCount="indefinite"/>
        </polygon>

        <clipPath id="circle-clip">
            <circle cx="125" cy="125" r="55"/>
        </clipPath>
        <image href="https://github.com/Madhav1912.png" x="70" y="70" height="110" width="110" clip-path="url(#circle-clip)" />

    </g>
</svg>
