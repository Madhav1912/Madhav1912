<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ba00ff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00ffe0" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/>
        </radialGradient>
        
        <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff8f"/>
            <stop offset="100%" stop-color="#ba00ff"/>
        </linearGradient>

        <filter id="neon">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="neon-strong">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="800" height="400" fill="#0b0f19" rx="20"/>
    
    <!-- Background Grid overlay -->
    <g stroke="#1f2937" stroke-width="1" opacity="0.4">
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" />
        </pattern>
        <rect width="800" height="400" fill="url(#grid)" />
    </g>

    <g transform="translate(400, 200)">
        
        <!-- Rotating Outer Rings -->
        <circle cx="0" cy="0" r="120" fill="none" stroke="#1f2937" stroke-width="2" stroke-dasharray="10 10">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="160" fill="none" stroke="#ba00ff" stroke-width="1" stroke-dasharray="30 20 5 20" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
        </circle>

        <!-- Connections (Wires) -->
        <g stroke="url(#wire)" stroke-width="3" filter="url(#neon)">
            <!-- Top Left: Node 1 -->
            <path d="M-40,-30 Q-150,-50 -200,-100" fill="none"/>
            <!-- Bottom Left: Node 2 -->
            <path d="M-40,30 Q-150,50 -200,100" fill="none"/>
            <!-- Top Right: Node 3 -->
            <path d="M40,-30 Q150,-50 200,-100" fill="none"/>
            <!-- Bottom Right: Node 4 -->
            <path d="M40,30 Q150,50 200,100" fill="none"/>
        </g>
        
        <!-- Data Packets -->
        <g filter="url(#neon-strong)">
            <!-- Packet 1 -->
            <circle r="6" fill="#00ffe0">
                <animateMotion dur="2.5s" repeatCount="indefinite" path="M-200,-100 Q-150,-50 -40,-30" />
            </circle>
            <!-- Packet 2 -->
            <circle r="6" fill="#ba00ff">
                <animateMotion dur="1.8s" repeatCount="indefinite" path="M-40,30 Q-150,50 -200,100" />
            </circle>
            <!-- Packet 3 -->
            <circle r="6" fill="#00ff8f">
                <animateMotion dur="2.1s" repeatCount="indefinite" path="M200,-100 Q150,-50 40,-30" />
            </circle>
            <!-- Packet 4 -->
            <circle r="6" fill="#00ffe0">
                <animateMotion dur="3s" repeatCount="indefinite" path="M40,30 Q150,50 200,100" />
            </circle>
            
            <!-- Secondary Packets to make it look busy -->
            <circle r="4" fill="#ba00ff">
                <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M-200,-100 Q-150,-50 -40,-30" />
            </circle>
            <circle r="4" fill="#00ff8f">
                <animateMotion dur="2.5s" begin="0.5s" repeatCount="indefinite" path="M200,-100 Q150,-50 40,-30" />
            </circle>
        </g>

        <!-- Radar element -->
        <g>
            <path d="M0,0 L0,-120 A120,120 0 0,1 120,0 Z" fill="url(#glow2)" opacity="0.2">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Central Hub -->
        <circle cx="0" cy="0" r="50" fill="url(#glow)" />
        <circle cx="0" cy="0" r="35" fill="#0b0f19" stroke="#00ffe0" stroke-width="4" filter="url(#neon)">
            <animate attributeName="stroke-width" values="4;7;4" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
        </circle>
        
        <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9" fill="none" stroke="#00ff8f" stroke-width="3" filter="url(#neon)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" />
        </polygon>
        
        <text x="0" y="5" font-family="'Courier New', monospace" font-size="14" fill="#00ffe0" text-anchor="middle" font-weight="900">CORE</text>

        <!-- Node 1: API Router -->
        <g transform="translate(-200, -100)">
            <circle r="25" fill="#0b0f19" stroke="#ba00ff" stroke-width="3" filter="url(#neon)">
                <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="-35" fill="#00ffe0" font-family="'Courier New', monospace" font-size="16" text-anchor="middle" font-weight="bold">API Gateway</text>
            <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#ba00ff" stroke-width="2">
                <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite" />
            </rect>
        </g>

        <!-- Node 2: Database -->
        <g transform="translate(-200, 100)">
            <circle r="25" fill="#0b0f19" stroke="#00ff8f" stroke-width="3" filter="url(#neon)">
                <animate attributeName="r" values="25;22;25" dur="2.5s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="45" fill="#00ff8f" font-family="'Courier New', monospace" font-size="16" text-anchor="middle" font-weight="bold">PostgreSQL</text>
            <circle r="10" fill="none" stroke="#00ff8f" stroke-dasharray="4 2">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
            </circle>
        </g>

        <!-- Node 3: Cloud AWS -->
        <g transform="translate(200, -100)">
            <circle r="25" fill="#0b0f19" stroke="#00ffe0" stroke-width="3" filter="url(#neon)">
                <animate attributeName="r" values="25;28;25" dur="3.5s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="-35" fill="#ba00ff" font-family="'Courier New', monospace" font-size="16" text-anchor="middle" font-weight="bold">AWS Cloud</text>
            <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#00ffe0" stroke-width="2">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
            </polygon>
        </g>

        <!-- Node 4: Cache -->
        <g transform="translate(200, 100)">
            <circle r="25" fill="#0b0f19" stroke="#ba00ff" stroke-width="3" filter="url(#neon)">
                <animate attributeName="r" values="25;22;25" dur="2.2s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="45" fill="#00ff8f" font-family="'Courier New', monospace" font-size="16" text-anchor="middle" font-weight="bold">Redis Cache</text>
            <g stroke="#ba00ff" stroke-width="2" fill="none">
                <line x1="-8" y1="-8" x2="8" y2="8" />
                <line x1="-8" y1="8" x2="8" y2="-8" />
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
            </g>
        </g>

    </g>
</svg>
