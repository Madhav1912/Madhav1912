<svg xmlns="http://www.w3.org/2000/svg" width="800" height="150" viewBox="0 0 800 150">
    <defs>
        <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00FF8F">
                <animate attributeName="stop-color" values="#00FF8F;#00FFE0;#00FF8F" dur="3s" repeatCount="indefinite" />
            </stop>
            <stop offset="50%" stop-color="#00FFE0">
                <animate attributeName="stop-color" values="#00FFE0;#BA00FF;#00FFE0" dur="3s" repeatCount="indefinite" />
            </stop>
            <stop offset="100%" stop-color="#BA00FF">
                <animate attributeName="stop-color" values="#BA00FF;#00FF8F;#BA00FF" dur="3s" repeatCount="indefinite" />
            </stop>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <style>
        .title {
            fill: url(#cyber);
            font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
            font-size: 60px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-anchor: middle;
            filter: url(#glow);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
    </style>
    <text x="400" y="95" class="title">MADHAV SRIVASTHA</text>
</svg>
