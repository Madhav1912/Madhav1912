<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
    <defs>
        <filter id="neon">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="js-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f7df1e" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/></radialGradient>
        <radialGradient id="ts-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#3178c6" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/></radialGradient>
        <radialGradient id="py-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#3776ab" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/></radialGradient>
        <radialGradient id="aws-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff9900" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/></radialGradient>
        <radialGradient id="dsa-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00ff8f" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/></radialGradient>
    </defs>
    
    <style>
        .skill-text { font-family: 'Courier New', monospace; font-weight: 800; font-size: 16px; text-anchor: middle; letter-spacing: 1px; }
        .node { animation: float 4s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.8s; }
        .delay-2 { animation-delay: 1.6s; }
        .delay-3 { animation-delay: 2.4s; }
        .delay-4 { animation-delay: 3.2s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>

    <rect width="800" height="220" fill="#0b0f19" rx="20"/>

    <!-- Animated Data Line -->
    <path d="M100,110 L700,110" stroke="#1f2937" stroke-width="3" stroke-dasharray="10 15" />
    <circle r="4" fill="#00ffe0" filter="url(#neon)">
        <animateMotion dur="4s" repeatCount="indefinite" path="M100,110 L700,110" />
    </circle>
    <circle r="4" fill="#ba00ff" filter="url(#neon)">
        <animateMotion dur="3s" repeatCount="indefinite" path="M700,110 L100,110" />
    </circle>

    <!-- Node 1: JavaScript -->
    <g transform="translate(120, 110)">
        <g class="node">
            <circle cx="0" cy="0" r="50" fill="url(#js-glow)" />
            <rect x="-24" y="-24" width="48" height="48" fill="#f7df1e" rx="8" filter="url(#neon)"/>
            <text x="0" y="6" font-family="Arial" font-weight="900" font-size="22" fill="#0b0f19" text-anchor="middle">JS</text>
            <text x="0" y="55" class="skill-text" fill="#f7df1e">JavaScript</text>
        </g>
    </g>

    <!-- Node 2: TypeScript -->
    <g transform="translate(260, 110)">
        <g class="node delay-1">
            <circle cx="0" cy="0" r="50" fill="url(#ts-glow)" />
            <rect x="-24" y="-24" width="48" height="48" fill="#3178c6" rx="8" filter="url(#neon)"/>
            <text x="0" y="6" font-family="Arial" font-weight="900" font-size="22" fill="#fff" text-anchor="middle">TS</text>
            <text x="0" y="55" class="skill-text" fill="#3178c6">TypeScript</text>
        </g>
    </g>

    <!-- Node 3: Python -->
    <g transform="translate(400, 110)">
        <g class="node delay-2">
            <circle cx="0" cy="0" r="50" fill="url(#py-glow)" />
            <circle cx="0" cy="0" r="26" fill="#3776ab" filter="url(#neon)"/>
            <text x="0" y="7" font-family="Arial" font-weight="900" font-size="20" fill="#ffd343" text-anchor="middle">PY</text>
            <text x="0" y="55" class="skill-text" fill="#4b8bbe">Python</text>
        </g>
    </g>

    <!-- Node 4: AWS -->
    <g transform="translate(540, 110)">
        <g class="node delay-3">
            <circle cx="0" cy="0" r="50" fill="url(#aws-glow)" />
            <polygon points="0,-26 22,-13 22,13 0,26 -22,13 -22,-13" fill="#ff9900" filter="url(#neon)"/>
            <text x="0" y="6" font-family="Arial" font-weight="900" font-size="14" fill="#0b0f19" text-anchor="middle">AWS</text>
            <text x="0" y="55" class="skill-text" fill="#ff9900">AWS</text>
        </g>
    </g>

    <!-- Node 5: DSA -->
    <g transform="translate(680, 110)">
        <g class="node delay-4">
            <circle cx="0" cy="0" r="50" fill="url(#dsa-glow)" />
            <polygon points="0,-24 24,0 0,24 -24,0" fill="#00ff8f" filter="url(#neon)"/>
            <text x="0" y="5" font-family="Arial" font-weight="900" font-size="16" fill="#0b0f19" text-anchor="middle">DSA</text>
            <text x="0" y="55" class="skill-text" fill="#00ff8f">Algorithms</text>
        </g>
    </g>

</svg>
